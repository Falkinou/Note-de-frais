<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#110a04}
body{font-family:'Outfit',sans-serif;color:#f0f0f0;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) translateX(-50%) scale(.95)}to{opacity:1;transform:translateY(0) translateX(-50%) scale(1)}}
@keyframes orangeDrop{
  0%{transform:translate(-150px,-400px) rotate(-40deg);opacity:0}
  8%{opacity:1}
  25%{transform:translate(-60px,30px) rotate(15deg);opacity:1}
  35%{transform:translate(-20px,-25px) rotate(-8deg)}
  48%{transform:translate(20px,15px) rotate(6deg)}
  58%{transform:translate(10px,-10px) rotate(-4deg)}
  68%{transform:translate(-5px,8px) rotate(3deg)}
  78%{transform:translate(3px,-4px) rotate(-1.5deg)}
  88%{transform:translate(-1px,2px) rotate(.5deg)}
  100%{transform:translate(0,0) rotate(0deg);opacity:1}
}
@keyframes popIn{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes stampSlam{
  0%{transform:translate(120px,300px) rotate(25deg);opacity:0}
  8%{opacity:1}
  25%{transform:translate(40px,-20px) rotate(-10deg);opacity:1}
  35%{transform:translate(15px,15px) rotate(6deg)}
  48%{transform:translate(-10px,-8px) rotate(-4deg)}
  58%{transform:translate(5px,5px) rotate(2deg)}
  68%{transform:translate(-3px,-3px) rotate(-1deg)}
  78%{transform:translate(1px,1px) rotate(.5deg)}
  88%{transform:translate(-0.5px,-0.5px) rotate(0deg)}
  100%{transform:translate(0,0) rotate(0deg);opacity:1}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 15% 0%,rgba(249,115,22,.28) 0%,transparent 50%),radial-gradient(ellipse at 85% 8%,rgba(251,191,36,.18) 0%,transparent 50%),radial-gradient(ellipse at 50% 95%,rgba(244,63,94,.16) 0%,transparent 50%),radial-gradient(ellipse at 60% 50%,rgba(249,168,37,.06) 0%,transparent 60%),linear-gradient(160deg,#110a04 0%,#1a0e06 50%,#120a04 100%)}
.glass{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:20px}
.glass-btn{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:16px;color:#fff;padding:16px 24px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;width:100%}
.glass-btn:active{transform:scale(.97);background:rgba(255,255,255,.1)}
.primary-btn{background:linear-gradient(135deg,#f97316,#f43f5e,#fbbf24);background-size:200% 200%;animation:shimmer 7s ease infinite;border:none;border-radius:18px;color:#fff;padding:18px 28px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;box-shadow:0 6px 30px rgba(249,115,22,.4),0 2px 8px rgba(244,63,94,.2);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;letter-spacing:.01em}
.primary-btn:active{transform:scale(.97)}.primary-btn:disabled{opacity:.5}
.sec-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#fff;padding:14px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.sec-btn:active{transform:scale(.97)}
.cdot{border-radius:50%;cursor:pointer;transition:all .2s;border:3px solid transparent;box-shadow:0 2px 10px rgba(0,0,0,.3)}

// Smart stamp positioning: analyze image to find the emptiest zone
function findBestPosition(imgSrc,callback){
  var im2=new Image();
  im2.onload=function(){
    var cv2=document.getElementById("cv2"),cx2=cv2.getContext("2d");
    // Downscale for fast analysis
    var aw=Math.min(im2.width,200),ah=Math.round(aw*im2.height/im2.width);
    cv2.width=aw;cv2.height=ah;
    cx2.drawImage(im2,0,0,aw,ah);
    var id=cx2.getImageData(0,0,aw,ah),d=id.data;

    // Convert to grayscale
    var gray=new Float32Array(aw*ah);
    for(var i=0;i<aw*ah;i++)gray[i]=d[i*4]*0.299+d[i*4+1]*0.587+d[i*4+2]*0.114;

    // Compute variance in blocks (lower variance = emptier area)
    // Stamp is roughly 40% width, 15% height
    var bw=Math.round(aw*0.35),bh=Math.round(ah*0.12);
    var bestX=50,bestY=75,bestScore=Infinity;
    var stepX=Math.max(2,Math.round(aw/20)),stepY=Math.max(2,Math.round(ah/20));

    for(var by=bh;by<ah-bh;by+=stepY){
      for(var bx=Math.round(bw/2);bx<aw-Math.round(bw/2);bx+=stepX){
        var sum=0,sum2=0,count=0;
        var x0=bx-Math.round(bw/2),y0=by-Math.round(bh/2);
        for(var yy=y0;yy<y0+bh&&yy<ah;yy++){
          for(var xx=x0;xx<x0+bw&&xx<aw;xx++){
            var v=gray[yy*aw+xx];
            sum+=v;sum2+=v*v;count++;
          }
        }
        if(count<10)continue;
        var mean=sum/count;
        var variance=(sum2/count)-(mean*mean);

        // Bonus: prefer bottom half (more natural), avoid very top
        var yPenalty=by<ah*0.15?500:0;
        var yBonus=by>ah*0.5?-variance*0.1:0;

        var score=variance+yPenalty+yBonus;
        if(score<bestScore){bestScore=score;bestX=(bx/aw)*100;bestY=(by/ah)*100}
      }
    }

    callback({x:Math.round(bestX),y:Math.round(bestY)});
  };
  im2.src=imgSrc;
}

function setupCrop(){
  var box=document.getElementById("cropBox"),ov=document.getElementById("cropOverlay");
  if(!box||!ov)return;
  drawCropUI();

  function getPos(e){
    var rect=box.getBoundingClientRect();
    var cx=e.clientX||((e.touches&&e.touches[0])?e.touches[0].clientX:0);
    var cy=e.clientY||((e.touches&&e.touches[0])?e.touches[0].clientY:0);
    return{x:Math.max(0,Math.min(100,((cx-rect.left)/rect.width)*100)),y:Math.max(0,Math.min(100,((cy-rect.top)/rect.height)*100))}
  }

  ov.addEventListener("pointerdown",function(e){
    var t=e.target;if(!t.dataset||!t.dataset.corner)return;
    e.preventDefault();e.stopPropagation();
    cropDrag=t.dataset.corner;
    t.setPointerCapture(e.pointerId);
  });
  ov.addEventListener("pointermove",function(e){
    if(!cropDrag)return;
    e.preventDefault();
    var p=getPos(e);
    if(cropDrag==="tl"){crop.x1=Math.min(p.x,crop.x2-8);crop.y1=Math.min(p.y,crop.y2-8)}
    else if(cropDrag==="tr"){crop.x2=Math.max(p.x,crop.x1+8);crop.y1=Math.min(p.y,crop.y2-8)}
    else if(cropDrag==="bl"){crop.x1=Math.min(p.x,crop.x2-8);crop.y2=Math.max(p.y,crop.y1+8)}
    else if(cropDrag==="br"){crop.x2=Math.max(p.x,crop.x1+8);crop.y2=Math.max(p.y,crop.y1+8)}
    drawCropUI();
  });
  ov.addEventListener("pointerup",function(){cropDrag=null});
  ov.addEventListener("pointercancel",function(){cropDrag=null});
}

function setupDragAndPinch(){
  var sd=document.getElementById("sd"),ic=document.getElementById("ic");
  if(!sd||!ic)return;
  sd.addEventListener("pointerdown",function(e){
    e.preventDefault();e.stopPropagation();
    var r=ic.getBoundingClientRect();
    doff={x:e.clientX-r.left-(r.width*sp.x)/100,y:e.clientY-r.top-(r.height*sp.y)/100};
    drag=true;sd.style.cursor="grabbing";
  });
  document.addEventListener("pointermove",function(e){
    if(!drag)return;var ic2=document.getElementById("ic");if(!ic2)return;
    var r=ic2.getBoundingClientRect();
    sp.x=Math.max(5,Math.min(95,((e.clientX-r.left-doff.x)/r.width)*100));
    sp.y=Math.max(5,Math.min(95,((e.clientY-r.top-doff.y)/r.height)*100));
    var sd2=document.getElementById("sd");if(sd2){sd2.style.left=sp.x+"%";sd2.style.top=sp.y+"%"}
  });
  document.addEventListener("pointerup",function(){if(drag){drag=false;savePos();var sd2=document.getElementById("sd");if(sd2)sd2.style.cursor="grab";if(navigator.vibrate)navigator.vibrate(15)}});
  ic.addEventListener("touchstart",function(e){
    if(e.touches.length===2){e.preventDefault();drag=false;
      var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchStartDist=Math.sqrt(dx*dx+dy*dy);pinchStartScale=S.scale;}
  },{passive:false});
  ic.addEventListener("touchmove",function(e){
    if(e.touches.length===2){e.preventDefault();
      var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      var dist=Math.sqrt(dx*dx+dy*dy),ratio=dist/pinchStartDist;
      S.scale=Math.max(0.3,Math.min(2.5,pinchStartScale*ratio));
      var sd2=document.getElementById("sd");if(sd2)sd2.style.transform="translate(-50%,-50%) scale("+S.scale+")";}
  },{passive:false});
  ic.addEventListener("touchend",function(e){if(e.touches.length<2&&pinchStartDist>0){pinchStartDist=0;save()}});
}

// ── REALISTIC STAMP RENDERER ──
function drawStampOnCanvas(cv,cx,imW,imH){
  var c=SC[S.colorIdx]||SC[0];
  var lines=S.address.split("\n").filter(Boolean);
  var ds=S.showDate?dateStr():null;if(ds)lines.push(ds);
  var sW=imW*0.4*S.scale,lH=sW*0.09,pd=lH*0.9;
  var sH=S.shape==="circle"?Math.max(sW,lines.length*lH+pd*2):lines.length*lH+pd*2;
  var sx=(imW*sp.x)/100-sW/2,sy=(imH*sp.y)/100-sH/2;
  var stampCx=sx+sW/2,stampCy=sy+sH/2;

  // Slight random rotation for hand-stamped feel
  var inkAngle=S.rotation||0;
  if(S.vintage)inkAngle+=(Math.random()-0.5)*4;

  cx.save();
  if(inkAngle){cx.translate(stampCx,stampCy);cx.rotate(inkAngle*Math.PI/180);cx.translate(-stampCx,-stampCy)}

  var inkAlpha=S.vintage?0.72:0.88;
  cx.globalAlpha=inkAlpha;
  cx.fillStyle=c.bg;cx.strokeStyle=c.bd;cx.lineWidth=Math.max(3,sW*0.012);

  if(!S.noBg){
    if(S.shape==="circle"){
      var ccx2=sx+sW/2,ccy2=sy+sH/2,rr=Math.max(sW,sH)/2;
      cx.beginPath();cx.arc(ccx2,ccy2,rr,0,Math.PI*2);cx.fill();cx.stroke();
    }else{
      var rr2=sW*0.035;cx.beginPath();cx.moveTo(sx+rr2,sy);cx.lineTo(sx+sW-rr2,sy);
      cx.quadraticCurveTo(sx+sW,sy,sx+sW,sy+rr2);cx.lineTo(sx+sW,sy+sH-rr2);
      cx.quadraticCurveTo(sx+sW,sy+sH,sx+sW-rr2,sy+sH);cx.lineTo(sx+rr2,sy+sH);
      cx.quadraticCurveTo(sx,sy+sH,sx,sy+sH-rr2);cx.lineTo(sx,sy+rr2);
      cx.quadraticCurveTo(sx,sy,sx+rr2,sy);cx.closePath();cx.fill();cx.stroke();
    }
    var ib=sW*0.025;
    cx.strokeStyle=S.vintage?"rgba(255,255,255,.08)":"rgba(255,255,255,.2)";cx.lineWidth=Math.max(1,sW*0.006);
    if(S.shape==="circle"){cx.beginPath();cx.arc(sx+sW/2,sy+sH/2,Math.max(sW,sH)/2-ib,0,Math.PI*2);cx.stroke()}
    else{cx.strokeRect(sx+ib,sy+ib,sW-ib*2,sH-ib*2)}
    if(S.vintage){cx.setLineDash([sW*0.02,sW*0.015]);cx.strokeStyle="rgba(255,255,255,.1)";cx.lineWidth=Math.max(1,sW*0.005);
      if(S.shape==="circle"){cx.beginPath();cx.arc(sx+sW/2,sy+sH/2,Math.max(sW,sH)/2-ib*2,0,Math.PI*2);cx.stroke()}
      else{cx.strokeRect(sx+ib*2,sy+ib*2,sW-ib*4,sH-ib*4)}cx.setLineDash([])}
  }

  // Text with ink variation
  var tc=S.textColor||c.tx,bw=S.bold?800:400,bw2=S.bold?600:400;
  cx.fillStyle=tc;cx.textAlign="center";var fs=lH*0.78;
  for(var i=0;i<lines.length;i++){
    var isD=ds&&i===lines.length-1;
    cx.font=isD?"400 "+(fs*0.78)+'px "Helvetica Neue",Arial,sans-serif':(i===0?bw:bw2)+" "+fs+'px "Helvetica Neue",Arial,sans-serif';
    // Ink pressure per line
    var lineAlpha=S.vintage?(0.6+Math.random()*0.3):(isD?0.7:1);
    cx.globalAlpha=lineAlpha;
    // Slight random offset for hand-stamped feel
    var offX=S.vintage?(Math.random()-0.5)*sW*0.01:0;
    var offY=S.vintage?(Math.random()-0.5)*lH*0.08:0;
    cx.fillText(lines[i],sx+sW/2+offX,sy+pd+(i+0.78)*lH+offY);
  }
  cx.restore();

  // Pixel-level ink effects - only when there's a background (not noBg)
  if(S.vintage&&!S.noBg){
    var gx=Math.max(0,Math.floor(sx)),gy=Math.max(0,Math.floor(sy));
    var gw=Math.min(Math.ceil(sW),cv.width-gx),gh=Math.min(Math.ceil(sH),cv.height-gy);
    if(gw>0&&gh>0){
      var id=cx.getImageData(gx,gy,gw,gh);
      var dd=id.data;
      for(var k=0;k<dd.length;k+=4){
        var px=(k/4)%gw,py=Math.floor((k/4)/gw);
        var dcx2=(px-gw/2)/(gw/2),dcy2=(py-gh/2)/(gh/2);
        var dist=Math.sqrt(dcx2*dcx2+dcy2*dcy2);
        var pressureFade=Math.min(1,dist*0.3);
        var noise=(Math.random()-0.5)*25;
        var bleed=Math.random()<0.02?-30:0;
        var edgeFade=dist>0.85?(dist-0.85)*150:0;
        dd[k]+=noise+bleed;dd[k+1]+=noise+bleed;dd[k+2]+=noise+bleed;
        dd[k+3]=Math.max(0,dd[k+3]-edgeFade-pressureFade*10);
      }
      cx.putImageData(id,gx,gy);
    }
  }
  cx.globalAlpha=1;
}

// ── GENERATE ──
window._gen=function(){
  var btn=document.getElementById("dlb");
  if(btn){btn.disabled=true;btn.textContent="⏳ Génération..."}
  var im=new Image();
  im.onload=function(){
    var cv=document.getElementById("cv"),cx=cv.getContext("2d");
    cv.width=im.width;cv.height=im.height;cx.drawImage(im,0,0);
    drawStampOnCanvas(cv,cx,im.width,im.height);

    cv.toBlob(function(blob){
      var fn=fname();
      function done(m,ok){
        if(ok){incCount();if(navigator.vibrate)navigator.vibrate([20,50,20]);showSuccess();
          setTimeout(function(){
            var bar=document.getElementById("dlb");
            if(bar&&bar.parentNode){
              var wrap=document.createElement("div");
              wrap.style.cssText="display:flex;gap:8px;margin-top:8px";
              var bk=document.createElement("button");
              bk.className="sec-btn";
              bk.style.cssText="flex:1;padding:14px;font-size:13px";
              bk.innerHTML="🏠 Menu";
              bk.onclick=function(){scr="home";render()};
              var np=document.createElement("button");
              np.className="primary-btn";
              np.style.cssText="flex:1;padding:14px;font-size:13px";
              np.innerHTML="📸 Nouvelle photo";
              np.onclick=function(){window._cam()};
              wrap.appendChild(bk);wrap.appendChild(np);
              bar.parentNode.appendChild(wrap);
            }
          },400);
        }
        if(btn){btn.disabled=false;btn.textContent="💾 Sauvegarder l'image"}toast(m);
      }

      function fallbackDownload(){
        try{
          var url=URL.createObjectURL(blob);
          var a=document.createElement("a");
          a.href=url;a.download=fn;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(function(){URL.revokeObjectURL(url)},5000);
          done(fn+" sauvegardé ✓",true);
        }catch(e2){
          // Last resort: open blob as image in new tab
          try{
            var reader=new FileReader();
            reader.onload=function(){
              var w=window.open("");
              if(w){w.document.write("<img src=\""+reader.result+"\" style=\"max-width:100%\"><p>Appuyez longuement sur l\'image pour la sauvegarder</p>");
                done("Appuyez longuement sur l'image pour sauvegarder",true);
              }else{done("Popup bloquée — autorisez les popups",false)}
            };
            reader.readAsDataURL(blob);
          }catch(e3){done("Erreur de sauvegarde",false)}
        }
      }

      // Save based on user preference
      if(saveMethod==="share"){
        try{
          if(navigator.share&&navigator.canShare){
            var file=new File([blob],fn,{type:"image/png"});
            if(navigator.canShare({files:[file]})){
              navigator.share({files:[file]}).then(function(){
                done(fn+" partagé ✓",true);
              }).catch(function(e){
                if(e.name==="AbortError"){if(btn){btn.disabled=false;btn.textContent="💾 Sauvegarder l'image"}}
                else{fallbackDownload()}
              });
              return;
            }
          }
        }catch(e){}
      }
      fallbackDownload();
    },"image/png");
  };
  im.src=img;
};

window._genPDF=function(){
  var btn2=document.getElementById("dlbpdf");
  if(btn2){btn2.disabled=true;btn2.textContent="⏳ Génération PDF..."}

  // First generate the stamped image on canvas (same as _gen)
  var im=new Image();
  im.onload=function(){
    var cv=document.getElementById("cv"),cx=cv.getContext("2d");
    cv.width=im.width;cv.height=im.height;cx.drawImage(im,0,0);
    drawStampOnCanvas(cv,cx,im.width,im.height);

    // Get JPEG data for smaller PDF
    var jpgData=cv.toDataURL("image/jpeg",0.92);
    var jpgRaw=atob(jpgData.split(",")[1]);
    var jpgLen=jpgRaw.length;
    var jpgBytes=new Uint8Array(jpgLen);
    for(var j=0;j<jpgLen;j++)jpgBytes[j]=jpgRaw.charCodeAt(j);

    // PDF size proportional to image (72 DPI, max 595pt wide)
    var iw=cv.width,ih=cv.height;
    var maxW=595.28;
    var scale2=Math.min(maxW/iw,1);
    var pw=iw*scale2,ph=ih*scale2;
    var dw=pw,dh=ph;
    var ox=0,oy=0;

    var o=[];
    function addObj(s){o.push(s);return o.length}
    addObj("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj");
    addObj("2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj");
    addObj("3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 "+pw.toFixed(2)+" "+ph.toFixed(2)+"] /Contents 4 0 R /Resources << /XObject << /Img 5 0 R >> >> >>\nendobj");
    addObj("4 0 obj\n<< /Length "+(("q "+dw.toFixed(2)+" 0 0 "+dh.toFixed(2)+" "+ox.toFixed(2)+" "+oy.toFixed(2)+" cm /Img Do Q").length)+" >>\nstream\nq "+dw.toFixed(2)+" 0 0 "+dh.toFixed(2)+" "+ox.toFixed(2)+" "+oy.toFixed(2)+" cm /Img Do Q\nendstream\nendobj");
    addObj("5 0 obj\n<< /Type /XObject /Subtype /Image /Width "+iw+" /Height "+ih+" /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length "+jpgLen+" >>\nstream\n");

    // Build PDF bytes
    var header="%PDF-1.4\n";
    var parts=[header];
    var offsets=[];
    for(var p=0;p<o.length;p++){
      var pos=0;for(var q=0;q<parts.length;q++)pos+=(typeof parts[q]==="string")?parts[q].length:parts[q].length;
      offsets.push(pos);
      parts.push(o[p]);
      if(p===4){parts.push(jpgBytes);parts.push("\nendstream\nendobj\n")}else{parts.push("\n")}
    }
    var xrefPos=0;for(var q2=0;q2<parts.length;q2++)xrefPos+=(typeof parts[q2]==="string")?parts[q2].length:parts[q2].length;
    var xref="xref\n0 "+(o.length+1)+"\n0000000000 65535 f \n";
    for(var r2=0;r2<offsets.length;r2++){var os2=String(offsets[r2]);while(os2.length<10)os2="0"+os2;xref+=os2+" 00000 n \n"}
    xref+="trailer\n<< /Size "+(o.length+1)+" /Root 1 0 R >>\nstartxref\n"+xrefPos+"\n%%EOF";
    parts.push(xref);

    // Combine all parts into one Uint8Array
    var totalLen=0;for(var t=0;t<parts.length;t++)totalLen+=(typeof parts[t]==="string")?parts[t].length:parts[t].length;
    var pdfBuf=new Uint8Array(totalLen);
    var off=0;
    for(var t2=0;t2<parts.length;t2++){
      if(typeof parts[t2]==="string"){for(var c2=0;c2<parts[t2].length;c2++){pdfBuf[off++]=parts[t2].charCodeAt(c2)}}
      else{pdfBuf.set(parts[t2],off);off+=parts[t2].length}
    }

    var pdfBlob=new Blob([pdfBuf],{type:"application/pdf"});
    var pdfName=fname().replace(".png",".pdf");

    function donePDF(m,ok){if(ok){incCount();showSuccess()}if(btn2){btn2.disabled=false;btn2.textContent="📄 Exporter en PDF"}if(m)toast(m)}

    function fallbackPDF(){
      try{
        var url=URL.createObjectURL(pdfBlob);
        var a=document.createElement("a");a.href=url;a.download=pdfName;
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(url)},5000);
        donePDF(pdfName+" sauvegardé ✓",true);
      }catch(e){
        // Last resort: open PDF in new tab
        try{
          var url2=URL.createObjectURL(pdfBlob);
          window.open(url2,"_blank");
          donePDF("PDF ouvert — sauvegardez depuis le navigateur",true);
        }catch(e2){donePDF("Erreur PDF",false)}
      }
    }

    // Try navigator.share first
    try{
      if(navigator.share&&navigator.canShare){
        var pdfFile=new File([pdfBlob],pdfName,{type:"application/pdf"});
        if(navigator.canShare({files:[pdfFile]})){
          navigator.share({files:[pdfFile]}).then(function(){
            donePDF(pdfName+" partagé ✓",true);
          }).catch(function(e){
            if(e.name==="AbortError"){donePDF("",false)}
            else{fallbackPDF()}
          });
          return;
        }
      }
    }catch(e){}
    fallbackPDF();
  };
  im.src=img;
};

// ── EXPRESS MODE ──
window._express=function(){
  var i=document.createElement("input");i.type="file";i.accept="image/*";
  i.setAttribute("capture","environment");
  i.style.position="fixed";i.style.left="-9999px";
  document.body.appendChild(i);
  i.addEventListener("change",function(e){
    var f=e.target&&e.target.files&&e.target.files[0];document.body.removeChild(i);if(!f)return;
    toast("⚡ Mode rapide...");
    var rd=new FileReader();
    rd.onload=function(ev){
      img=ev.target.result;imgFull=img;
      // Set minimum stamp scale
      var savedScale=S.scale;
      S.scale=0.6;
      // Find best position then render and auto-save
      findBestPosition(img,function(pos){
        sp=pos;
        // Draw on canvas
        var im2=new Image();
        im2.onload=function(){
          var cv=document.getElementById("cv"),cx=cv.getContext("2d");
          cv.width=im2.width;cv.height=im2.height;cx.drawImage(im2,0,0);
          drawStampOnCanvas(cv,cx,im2.width,im2.height);
          // Auto-save
          cv.toBlob(function(blob){
            var fn=fname();
            S.scale=savedScale;
            function expressDone(m){
              incCount();if(navigator.vibrate)navigator.vibrate([20,50,20]);
              showSuccess();toast(m);
              setTimeout(function(){scr="home";render()},1800);
            }
            // Save based on preference
            if(saveMethod==="share"){
              try{
                if(navigator.share&&navigator.canShare){
                  var file=new File([blob],fn,{type:"image/png"});
                  if(navigator.canShare({files:[file]})){
                    navigator.share({files:[file]}).then(function(){
                      expressDone(fn+" ⚡ partagé !");
                    }).catch(function(e){
                      if(e.name==="AbortError"){S.scale=savedScale;scr="home";render()}
                      else{expressDownload(blob,fn,expressDone,savedScale)}
                    });return;
                  }
                }
              }catch(e){}
            }
            expressDownload(blob,fn,expressDone,savedScale);
          },"image/png");
        };
        im2.src=img;
      });
    };
    rd.readAsDataURL(f);
  });
  setTimeout(function(){i.click()},100);
};

function expressDownload(blob,fn,cb,savedScale){
  try{
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.download=fn;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url)},5000);
    cb(fn+" ⚡ sauvegardé !");
  }catch(e){
    S.scale=savedScale;
    toast("Erreur de sauvegarde");scr="home";render();
  }
}

window._go=function(s){scr=s;render()};
window._cam=function(){fileInput(true)};
window._gal=function(){fileInput(false)};
window._setSaveMethod=function(m){saveMethod=m;try{localStorage.setItem("ndf_savemethod",m)}catch(e){}render()};
window._savestamp=function(){toast("Tampon sauvegardé ✓");scr="home";render()};
window._addr=function(v){S.address=v;save();var p=document.getElementById("stampPreview");if(p)p.innerHTML=shtml(false)};
window._shape=function(v){S.shape=v;save();render()};
window._ci=function(i){S.colorIdx=i;save();render()};
window._tnobg=function(){S.noBg=!S.noBg;save();render()};
window._tc=function(v){S.textColor=v;save();render()};
window._tbold=function(){S.bold=!S.bold;save();render()};
window._tvint=function(){S.vintage=!S.vintage;save();render()};
window._sc=function(v){S.scale=parseFloat(v);save();var p=document.getElementById("stampPreview");if(p)p.innerHTML=shtml(false)};
window._tdate=function(){S.showDate=!S.showDate;save();render()};
window._rot=function(v){S.rotation=parseInt(v)||0;save();
  var sd=document.getElementById("sd");
  if(sd)sd.innerHTML=shtml(true);
  var lbl=document.querySelector('[oninput*="_rot"]');
  if(lbl&&lbl.previousElementSibling)lbl.previousElementSibling.textContent=S.rotation+"°";
};
window._setDate=function(v){
  if(v){var parts=v.split("-");ndfDate=parts[2]+parts[1]+parts[0]}else{ndfDate=""}
  var sp2=document.querySelector('[style*="min-width:90px"]');if(sp2)sp2.textContent=fname();
};
window._rotate90=function(){
  var im=new Image();
  im.onload=function(){
    var cv2=document.getElementById("cv2"),cx=cv2.getContext("2d");
    cv2.width=im.height;cv2.height=im.width;
    cx.translate(im.height,0);cx.rotate(Math.PI/2);
    cx.drawImage(im,0,0);
    imgFull=cv2.toDataURL("image/png");
    crop={x1:5,y1:5,x2:95,y2:95};
    scr="crop";render();
    toast("Rotation 90° ✓");
  };
  im.src=imgFull;
};

// ── SUCCESS ANIMATION ──
function showSuccess(){
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);animation:fadeIn .3s ease";
  ov.innerHTML='<div style="text-align:center;animation:popIn .5s cubic-bezier(.17,.67,.21,1.27)"><div style="font-size:80px;margin-bottom:16px">✅</div><div style="font-size:20px;font-weight:700;color:#fff">Tamponné !</div></div>';
  document.body.appendChild(ov);
  setTimeout(function(){ov.style.opacity="0";ov.style.transition="opacity .3s";setTimeout(function(){document.body.removeChild(ov)},300)},1200);
}

// ── PWA SERVICE WORKER ──
if("serviceWorker" in navigator){
  var swCode="self.addEventListener('install',function(e){self.skipWaiting()});self.addEventListener('activate',function(e){e.waitUntil(clients.claim())});self.addEventListener('fetch',function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).then(function(resp){return caches.open('ndf-v1').then(function(cache){cache.put(e.request,resp.clone());return resp})})}))})";
  var swBlob=new Blob([swCode],{type:"application/javascript"});
  var swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

render();
})();
