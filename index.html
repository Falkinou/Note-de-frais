<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#110a04}
body{font-family:'Outfit',sans-serif;color:#f0f0f0;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) translateX(-50%) scale(.95)}to{opacity:1;transform:translateY(0) translateX(-50%) scale(1)}}
.app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 15% 0%,rgba(249,115,22,.28) 0%,transparent 50%),radial-gradient(ellipse at 85% 8%,rgba(251,191,36,.18) 0%,transparent 50%),radial-gradient(ellipse at 50% 95%,rgba(244,63,94,.16) 0%,transparent 50%),radial-gradient(ellipse at 60% 50%,rgba(249,168,37,.06) 0%,transparent 60%),linear-gradient(160deg,#110a04 0%,#1a0e06 50%,#120a04 100%)}
.glass{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:20px}
.glass-btn{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:16px;color:#fff;padding:16px 24px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;width:100%}
.glass-btn:active{transform:scale(.97);background:rgba(255,255,255,.1)}
.primary-btn{background:linear-gradient(135deg,#f97316,#f43f5e,#fbbf24);background-size:200% 200%;animation:shimmer 4s ease infinite;border:none;border-radius:18px;color:#fff;padding:18px 28px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;box-shadow:0 6px 30px rgba(249,115,22,.4),0 2px 8px rgba(244,63,94,.2);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;letter-spacing:.01em}
.primary-btn:active{transform:scale(.97)}.primary-btn:disabled{opacity:.5}
.sec-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#fff;padding:14px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.sec-btn:active{transform:scale(.97)}
.cdot{border-radius:50%;cursor:pointer;transition:all .2s;border:3px solid transparent;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.cdot:active{transform:scale(1.1)}
.shape-btn{flex:1;padding:12px;border-radius:14px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.shape-btn.active{border-color:#f97316;background:rgba(249,115,22,.15);box-shadow:0 0 16px rgba(249,115,22,.25)}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:5px;background:rgba(255,255,255,.12);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#f97316,#f43f5e);box-shadow:0 2px 10px rgba(249,115,22,.5);cursor:pointer}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(249,115,22,.95);color:#fff;padding:12px 28px;border-radius:30px;font-weight:600;font-size:14px;animation:toastIn .3s ease;z-index:999;box-shadow:0 8px 30px rgba(249,115,22,.4);backdrop-filter:blur(12px);font-family:'Outfit',sans-serif;white-space:nowrap;display:none}
.tog{width:50px;height:28px;border-radius:14px;border:none;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}
.tog .dot{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tog.on{background:linear-gradient(135deg,#f97316,#f43f5e);box-shadow:0 0 14px rgba(249,115,22,.4)}.tog.on .dot{left:25px}
.tog.off{background:rgba(255,255,255,.1);box-shadow:none}.tog.off .dot{left:3px}
.lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.hdr{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(17,10,4,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.htitle{font-size:17px;font-weight:700;background:linear-gradient(135deg,#fdba74,#fb923c,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.scr{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;min-height:0}
textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#f0f0f0;padding:12px 14px;font-size:14px;font-family:'Outfit',sans-serif;line-height:1.6;resize:none;outline:none;box-sizing:border-box}
.blob1{position:fixed;top:-80px;right:-80px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(251,191,36,.15),transparent 70%);pointer-events:none}
.blob2{position:fixed;bottom:-60px;left:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(244,63,94,.12),transparent 70%);pointer-events:none}
.blob3{position:fixed;top:40%;left:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,.08),transparent 70%);pointer-events:none}
.grdt{background:linear-gradient(135deg,#fdba74,#fb923c,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pinch-hint{font-size:12px;color:rgba(255,255,255,.35);margin-top:12px;text-align:center;line-height:1.5}
.crop-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.crop-handle{position:absolute;width:28px;height:28px;border-radius:50%;background:rgba(249,115,22,.9);border:2px solid #fff;pointer-events:all;cursor:move;z-index:20;transform:translate(-50%,-50%);box-shadow:0 2px 10px rgba(0,0,0,.5)}
.crop-dim{position:absolute;background:rgba(0,0,0,.55)}
</style>

<body>
<div id="app" class="app"></div>
<canvas id="cv" style="display:none"></canvas>
<canvas id="cv2" style="display:none"></canvas>
<div id="toast" class="toast"></div>
<script>
(function(){
"use strict";

var SC=[
  {n:"Orange",bg:"rgba(249,115,22,.88)",bd:"#fb923c",tx:"#fff"},
  {n:"Corail",bg:"rgba(244,63,94,.88)",bd:"#fb7185",tx:"#fff"},
  {n:"Ambre",bg:"rgba(245,158,11,.88)",bd:"#fbbf24",tx:"#fff"},
  {n:"Fuchsia",bg:"rgba(217,70,239,.88)",bd:"#e879f9",tx:"#fff"},
  {n:"Noir",bg:"rgba(15,15,20,.92)",bd:"#555",tx:"#fff"}
];
var TC=[
  {n:"Blanc",v:"#ffffff"},{n:"Noir",v:"#111111"},
  {n:"Orange",v:"#fb923c"},{n:"Corail",v:"#fb7185"},
  {n:"Ambre",v:"#fbbf24"},{n:"Fuchsia",v:"#e879f9"},
  {n:"Rouge",v:"#ef4444"},{n:"Vert",v:"#4ade80"}
];
var DS={address:"Orange SA\n111, Quai du Pr\u00e9sident Roosevelt,\n92130 Issy Les Moulineaux",colorIdx:0,scale:1,showDate:true,shape:"rect",noBg:false,textColor:"#ffffff",bold:true,vintage:false,rotation:0};

var S,scr="home",img=null,imgFull=null,sp={x:60,y:70},drag=false,doff={x:0,y:0},tt;
var pinchStartDist=0,pinchStartScale=1;
var crop={x1:10,y1:10,x2:90,y2:90},cropDrag=null,cropOff={x:0,y:0};
var stampCount=0;
var ndfDate="";

try{var r=localStorage.getItem("ndf_stamp_v6");S=r?Object.assign({},DS,JSON.parse(r)):Object.assign({},DS)}catch(e){S=Object.assign({},DS)}
try{stampCount=parseInt(localStorage.getItem("ndf_count"))||0}catch(e){}

function incCount(){stampCount++;try{localStorage.setItem("ndf_count",String(stampCount))}catch(e){}}

function save(){try{localStorage.setItem("ndf_stamp_v6",JSON.stringify(S))}catch(e){}}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function dateStr(){return new Date().toLocaleDateString("fr-FR")}
function fname(){
  // Use ndfDate if set (from ticket), else today
  if(ndfDate){
    var clean=ndfDate.replace(/[^0-9]/g,"");
    if(clean.length>=8)return "NDF_"+clean.substring(0,8)+".png";
  }
  var n=new Date(),p=function(v){return String(v).length<2?"0"+v:String(v)};
  return "NDF_"+p(n.getDate())+p(n.getMonth()+1)+n.getFullYear()+".png";
}
function toast(m){clearTimeout(tt);var t=document.getElementById("toast");t.textContent=m;t.style.display="block";tt=setTimeout(function(){t.style.display="none"},2400)}

// ── STAMP HTML ──
function shtml(small){
  var c=SC[S.colorIdx]||SC[0],sz=small?0.7:1,lines=S.address.split("\n").filter(Boolean);
  var isC=S.shape==="circle",tc=S.textColor||c.tx,fw=S.bold?800:400,fw2=S.bold?600:400;
  var bg,bd,bs,bf;
  if(S.noBg){bg="transparent";bd="2.5px dashed "+c.bd;bs="none";bf="none"}
  else{bg=c.bg;bd="2.5px solid "+c.bd;bs="0 8px 32px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.15)";bf="blur(6px)"}
  var padV=isC?(22*sz):(10*sz),padH=18*sz,br=isC?"50%":(8*sz)+"px";
  var extra=isC?"min-width:"+(90*sz)+"px;min-height:"+(90*sz)+"px;aspect-ratio:1;":"";
  // Vintage: add rotation, opacity, texture
  var vintStyle=S.vintage?"opacity:.82;filter:saturate(.7) contrast(1.1);":"";
  var rotStyle=S.rotation?"transform:rotate("+S.rotation+"deg);":"";
  var h='<div style="'+rotStyle+vintStyle+"background:"+bg+";border:"+bd+";border-radius:"+br+";padding:"+padV+"px "+padH+"px;text-align:center;box-shadow:"+bs+";backdrop-filter:"+bf+";-webkit-backdrop-filter:"+bf+";display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;"+extra+'">';
  if(S.vintage){
    // Add inner worn border
    h+='<div style="position:absolute;inset:3px;border:1.5px dashed rgba(255,255,255,.18);border-radius:'+(isC?"50%":(6*sz)+"px")+';pointer-events:none"></div>';
  }
  for(var i=0;i<lines.length;i++){
    var fs=(i===0?12:10.5)*sz*S.scale;
    h+='<div style="color:'+tc+";font-size:"+fs+"px;font-weight:"+(i===0?fw:fw2)+";line-height:1.55;white-space:nowrap;letter-spacing:.03em;font-family:'Space Grotesk','Outfit',sans-serif\">"+esc(lines[i])+"</div>";
  }
  if(S.showDate){
    h+='<div style="color:'+tc+";font-size:"+(9*sz*S.scale)+"px;font-weight:400;opacity:.7;margin-top:"+(3*sz)+"px;letter-spacing:.06em;font-family:'Space Grotesk',sans-serif\">"+dateStr()+"</div>";
  }
  h+="</div>";return h;
}

function togHTML(fn,on){return '<button class="tog '+(on?"on":"off")+'" onclick="'+fn+'"><div class="dot"></div></button>'}

function render(){
  var el=document.getElementById("app");
  if(scr==="home")renderHome(el);
  else if(scr==="stamp")renderStamp(el);
  else if(scr==="crop")renderCrop(el);
  else if(scr==="edit")renderEdit(el);
}

// ── HOME ──
function renderHome(el){
  var fl=esc(S.address.split("\n")[0]);
  var h='<div class="scr" style="padding-bottom:40px">';
  h+='<div style="padding:50px 24px 30px;text-align:center">';
  h+='<div style="width:90px;height:90px;border-radius:50%;margin:0 auto 24px;background:linear-gradient(145deg,rgba(249,115,22,.35),rgba(244,63,94,.25));border:2px solid rgba(255,255,255,.1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;font-size:40px;animation:float 3s ease infinite;box-shadow:0 8px 40px rgba(249,115,22,.25)">🍊</div>';
  h+='<h1 style="font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.15" class="grdt">Tampon<br>Note de Frais</h1>';
  h+='<p style="font-size:14px;color:rgba(255,255,255,.45);margin:12px auto 0;line-height:1.6;max-width:280px;animation:fadeUp .6s ease .1s both">Apposez votre tampon d\'adresse sur vos justificatifs en un instant.</p>';
  h+='</div>';
  h+='<div style="padding:0 20px;animation:fadeUp .6s ease .15s both">';
  h+='<div class="glass" style="padding:20px;margin-bottom:14px;cursor:pointer" onclick="window._go(\'stamp\')">';
  h+='<div style="display:flex;align-items:center;gap:16px">'+shtml(true);
  h+='<div style="flex:1"><div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px">Mon Tampon</div>';
  h+='<div style="font-size:12px;color:rgba(255,255,255,.45);line-height:1.5">'+fl+'</div>';
  h+='<div style="font-size:11px;font-weight:600;margin-top:8px;background:linear-gradient(135deg,#fb923c,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Personnaliser ›</div>';
  h+='</div></div></div>';
  h+='<div style="padding:0 20px;display:flex;flex-direction:column;gap:12px;animation:fadeUp .6s ease .25s both">';
  h+='<button class="primary-btn" onclick="window._cam()"><span style="font-size:20px">📸</span> Prendre une photo</button>';
  h+='<button class="glass-btn" onclick="window._gal()"><span style="font-size:18px">🖼️</span> Importer une image</button>';
  h+='</div></div>';

  // Counter
  if(stampCount>0){
    h+='<div style="padding:24px 20px 0;animation:fadeUp .6s ease .35s both;text-align:center">';
    h+='<div class="glass" style="padding:16px;display:flex;align-items:center;justify-content:center;gap:10px">';
    h+='<span style="font-size:24px">🍊</span>';
    h+='<span style="font-size:15px;font-weight:700;color:#fff">J\'ai tamponné <span style="background:linear-gradient(135deg,#fb923c,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:20px">'+stampCount+'</span> resto'+(stampCount>1?"s":"")+'</span>';
    h+='</div></div>';
  }

  // Privacy
  h+='<div style="padding:20px 30px 30px;animation:fadeUp .6s ease .4s both;text-align:center">';
  h+='<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px"><span style="font-size:14px">🔒</span><span style="font-size:11px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em">100% privé</span></div>';
  h+='<p style="font-size:11px;color:rgba(255,255,255,.25);line-height:1.5">Vos tickets et photos ne quittent jamais votre appareil. Tout le traitement est effectué localement, aucune donnée n\'est envoyée sur un serveur.</p>';
  h+='</div>';

  // Copyright
  h+='<div style="padding:0 30px 24px;text-align:center"><p style="font-size:9px;color:rgba(255,255,255,.15);letter-spacing:.04em">© '+new Date().getFullYear()+' Lo\u00efc Arnold</p></div>';

  h+='<div class="blob1"></div><div class="blob2"></div><div class="blob3"></div>';
  el.innerHTML=h;
}

// ── STAMP CONFIG ──
function renderStamp(el){
  var h='<div class="hdr"><span class="htitle">Mon Tampon</span>';
  h+='<button class="glass-btn" style="width:auto;padding:8px 18px;font-size:13px;gap:6px" onclick="window._savestamp()">✓ Sauvegarder</button></div>';
  h+='<div class="scr" style="padding:20px;display:flex;flex-direction:column;gap:20px;padding-bottom:40px">';
  h+='<div id="stampPreview" style="display:flex;justify-content:center;padding:24px 0;animation:fadeUp .4s ease">'+shtml(false)+'</div>';
  h+='<div class="glass" style="padding:16px"><div class="lbl">Adresse</div>';
  h+='<textarea id="addr" rows="4" oninput="window._addr(this.value)">'+esc(S.address)+'</textarea></div>';
  h+='<div class="glass" style="padding:16px"><div class="lbl">Forme</div><div style="display:flex;gap:10px">';
  h+='<button class="shape-btn '+(S.shape==="rect"?"active":"")+'" onclick="window._shape(\'rect\')">▬ Rectangle</button>';
  h+='<button class="shape-btn '+(S.shape==="circle"?"active":"")+'" onclick="window._shape(\'circle\')">● Cercle</button>';
  h+='</div></div>';
  h+='<div class="glass" style="padding:16px"><div class="lbl">Couleur du fond</div><div style="display:flex;gap:12px;flex-wrap:wrap">';
  for(var i=0;i<SC.length;i++){var act=i===S.colorIdx;var shd=act?"0 0 20px "+SC[i].bd+",0 2px 10px rgba(0,0,0,.3)":"0 2px 10px rgba(0,0,0,.3)";
    h+='<div class="cdot" style="width:34px;height:34px;background:'+SC[i].bg+";border-color:"+(act?"#fff":"transparent")+";transform:scale("+(act?1.15:1)+");box-shadow:"+shd+";opacity:"+(S.noBg?0.35:1)+'" onclick="window._ci('+i+')"></div>';}
  h+='</div></div>';
  h+='<div class="glass" style="padding:16px"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:14px;font-weight:600;color:#fff">Fond transparent</div><div style="font-size:12px;color:rgba(255,255,255,.4)">Texte seul</div></div>'+togHTML("window._tnobg()",S.noBg)+'</div></div>';
  h+='<div class="glass" style="padding:16px"><div class="lbl">Couleur du texte</div><div style="display:flex;gap:10px;flex-wrap:wrap">';
  for(var j=0;j<TC.length;j++){var ta=S.textColor===TC[j].v;var tsb=ta?"0 0 16px rgba(249,115,22,.5),0 2px 8px rgba(0,0,0,.3)":(TC[j].v==="#111111"?"inset 0 0 0 1px rgba(255,255,255,.15),0 2px 8px rgba(0,0,0,.3)":"0 2px 8px rgba(0,0,0,.3)");
    h+='<div class="cdot" style="width:30px;height:30px;background:'+TC[j].v+";border-color:"+(ta?"#fb923c":"transparent")+";transform:scale("+(ta?1.15:1)+");box-shadow:"+tsb+'" onclick="window._tc(\''+TC[j].v+'\')" title="'+TC[j].n+'"></div>';}
  h+='</div></div>';

function setupCrop(){
  var box=document.getElementById("cropBox"),ov=document.getElementById("cropOverlay");
  if(!box||!ov)return;
  drawCropUI();
  // Touch/pointer events on handles
  ov.addEventListener("pointerdown",function(e){
    var t=e.target;if(!t.dataset.corner)return;
    e.preventDefault();e.stopPropagation();
    cropDrag=t.dataset.corner;
    var rect=box.getBoundingClientRect();
    cropOff={bx:rect.left,by:rect.top,bw:rect.width,bh:rect.height};
  });
  document.addEventListener("pointermove",function(e){
    if(!cropDrag)return;
    var px=((e.clientX-cropOff.bx)/cropOff.bw)*100;
    var py=((e.clientY-cropOff.by)/cropOff.bh)*100;
    px=Math.max(0,Math.min(100,px));py=Math.max(0,Math.min(100,py));
    if(cropDrag==="tl"){crop.x1=Math.min(px,crop.x2-10);crop.y1=Math.min(py,crop.y2-10)}
    else if(cropDrag==="tr"){crop.x2=Math.max(px,crop.x1+10);crop.y1=Math.min(py,crop.y2-10)}
    else if(cropDrag==="bl"){crop.x1=Math.min(px,crop.x2-10);crop.y2=Math.max(py,crop.y1+10)}
    else if(cropDrag==="br"){crop.x2=Math.max(px,crop.x1+10);crop.y2=Math.max(py,crop.y1+10)}
    drawCropUI();
  });
  document.addEventListener("pointerup",function(){cropDrag=null});
}

function drawCropUI(){
  var ov=document.getElementById("cropOverlay");if(!ov)return;
  var x1=crop.x1,y1=crop.y1,x2=crop.x2,y2=crop.y2;
  var h='';
  // Dim regions
  h+='<div class="crop-dim" style="top:0;left:0;right:0;height:'+y1+'%"></div>';
  h+='<div class="crop-dim" style="bottom:0;left:0;right:0;height:'+(100-y2)+'%"></div>';
  h+='<div class="crop-dim" style="top:'+y1+'%;left:0;width:'+x1+'%;height:'+(y2-y1)+'%"></div>';
  h+='<div class="crop-dim" style="top:'+y1+'%;right:0;width:'+(100-x2)+'%;height:'+(y2-y1)+'%"></div>';

  h+='<div style="position:absolute;left:'+x1+'%;top:'+y1+'%;width:'+(x2-x1)+'%;height:'+(y2-y1)+'%;border:2px solid rgba(249,115,22,.8);pointer-events:none;border-radius:4px"></div>';

  h+='<div class="crop-handle" data-corner="tl" style="left:'+x1+'%;top:'+y1+'%"></div>';

  h+='<div class="crop-handle" data-corner="bl" style="left:'+x1+'%;top:'+y2+'%"></div>';

// ── DRAG + PINCH ──
function setupDragAndPinch(){
  var sd=document.getElementById("sd"),ic=document.getElementById("ic");
  if(!sd||!ic)return;
  sd.addEventListener("pointerdown",function(e){
    e.preventDefault();e.stopPropagation();
    var r=ic.getBoundingClientRect();
    doff={x:e.clientX-r.left-(r.width*sp.x)/100,y:e.clientY-r.top-(r.height*sp.y)/100};
    drag=true;sd.style.cursor="grabbing";
  });
  document.addEventListener("pointermove",function(e){
    if(!drag)return;var ic2=document.getElementById("ic");if(!ic2)return;
    var r=ic2.getBoundingClientRect();
    sp.x=Math.max(5,Math.min(95,((e.clientX-r.left-doff.x)/r.width)*100));
    sp.y=Math.max(5,Math.min(95,((e.clientY-r.top-doff.y)/r.height)*100));
    var sd2=document.getElementById("sd");if(sd2){sd2.style.left=sp.x+"%";sd2.style.top=sp.y+"%"}
  });
  document.addEventListener("pointerup",function(){if(drag){drag=false;var sd2=document.getElementById("sd");if(sd2)sd2.style.cursor="grab"}});
  ic.addEventListener("touchstart",function(e){
    if(e.touches.length===2){e.preventDefault();drag=false;
      var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchStartDist=Math.sqrt(dx*dx+dy*dy);pinchStartScale=S.scale;}
  },{passive:false});
  ic.addEventListener("touchmove",function(e){
    if(e.touches.length===2){e.preventDefault();
      var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      var dist=Math.sqrt(dx*dx+dy*dy),ratio=dist/pinchStartDist;
      S.scale=Math.max(0.3,Math.min(2.5,pinchStartScale*ratio));
      var sd2=document.getElementById("sd");if(sd2)sd2.style.transform="translate(-50%,-50%) scale("+S.scale+")";}
  },{passive:false});
  ic.addEventListener("touchend",function(e){if(e.touches.length<2&&pinchStartDist>0){pinchStartDist=0;save()}});
}

function fileInput(capture){
  var i=document.createElement("input");i.type="file";i.accept="image/*";
  if(capture)i.setAttribute("capture","environment");
  i.style.position="fixed";i.style.left="-9999px";
  document.body.appendChild(i);
  i.addEventListener("change",function(e){
    var f=e.target&&e.target.files&&e.target.files[0];document.body.removeChild(i);if(!f)return;
    var rd=new FileReader();
    rd.onload=function(ev){imgFull=ev.target.result;img=imgFull;crop={x1:5,y1:5,x2:95,y2:95};scr="crop";render()};
    rd.readAsDataURL(f);
  });
  setTimeout(function(){i.click()},100);
}

// ── GENERATE ──
window._gen=function(){
  var btn=document.getElementById("dlb");
  if(btn){btn.disabled=true;btn.textContent="⏳ Génération..."}
  var im=new Image();
  im.onload=function(){
    var cv=document.getElementById("cv"),cx=cv.getContext("2d");
    cv.width=im.width;cv.height=im.height;cx.drawImage(im,0,0);
    var c=SC[S.colorIdx]||SC[0];
    var lines=S.address.split("\n").filter(Boolean);
    var ds=S.showDate?dateStr():null;if(ds)lines.push(ds);
    var sW=im.width*0.4*S.scale,lH=sW*0.09,pd=lH*0.9;
    var sH=S.shape==="circle"?Math.max(sW,lines.length*lH+pd*2):lines.length*lH+pd*2;
    var sx=(im.width*sp.x)/100-sW/2,sy=(im.height*sp.y)/100-sH/2;

    // Draw stamp background
    cx.save();
    // Apply rotation around stamp center
    var stampCx=sx+sW/2,stampCy=sy+sH/2;
    if(S.rotation){cx.translate(stampCx,stampCy);cx.rotate(S.rotation*Math.PI/180);cx.translate(-stampCx,-stampCy)}
    if(S.vintage){cx.globalAlpha=0.78}
    cx.fillStyle=c.bg;cx.strokeStyle=c.bd;cx.lineWidth=Math.max(3,sW*0.012);
    if(!S.noBg){
      if(S.shape==="circle"){var ccx2=sx+sW/2,ccy2=sy+sH/2,rr=Math.max(sW,sH)/2;cx.beginPath();cx.arc(ccx2,ccy2,rr,0,Math.PI*2);cx.fill();cx.stroke()}
      else{var rr2=sW*0.035;cx.beginPath();cx.moveTo(sx+rr2,sy);cx.lineTo(sx+sW-rr2,sy);cx.quadraticCurveTo(sx+sW,sy,sx+sW,sy+rr2);cx.lineTo(sx+sW,sy+sH-rr2);cx.quadraticCurveTo(sx+sW,sy+sH,sx+sW-rr2,sy+sH);cx.lineTo(sx+rr2,sy+sH);cx.quadraticCurveTo(sx,sy+sH,sx,sy+sH-rr2);cx.lineTo(sx,sy+rr2);cx.quadraticCurveTo(sx,sy,sx+rr2,sy);cx.closePath();cx.fill();cx.stroke()}
      // Inner border
      var ib=sW*0.025;cx.strokeStyle=S.vintage?"rgba(255,255,255,.1)":"rgba(255,255,255,.2)";cx.lineWidth=Math.max(1,sW*0.006);
      if(S.shape==="circle"){cx.beginPath();cx.arc(sx+sW/2,sy+sH/2,Math.max(sW,sH)/2-ib,0,Math.PI*2);cx.stroke()}
      else{cx.strokeRect(sx+ib,sy+ib,sW-ib*2,sH-ib*2)}
      // Vintage: add dashed inner border
      if(S.vintage){cx.setLineDash([sW*0.02,sW*0.015]);cx.strokeStyle="rgba(255,255,255,.12)";cx.lineWidth=Math.max(1,sW*0.005);
        if(S.shape==="circle"){cx.beginPath();cx.arc(sx+sW/2,sy+sH/2,Math.max(sW,sH)/2-ib*2,0,Math.PI*2);cx.stroke()}
        else{cx.strokeRect(sx+ib*2,sy+ib*2,sW-ib*4,sH-ib*4)}cx.setLineDash([])}
    }
    cx.restore();

    // Text
    var tc=S.textColor||c.tx,bw=S.bold?800:400,bw2=S.bold?600:400;
    cx.fillStyle=tc;cx.textAlign="center";var fs=lH*0.78;
    if(S.vintage)cx.globalAlpha=0.82;
    for(var i=0;i<lines.length;i++){
      var isD=ds&&i===lines.length-1;
      cx.font=isD?"400 "+(fs*0.78)+'px "Helvetica Neue",Arial,sans-serif':(i===0?bw:bw2)+" "+fs+'px "Helvetica Neue",Arial,sans-serif';
      if(isD)cx.globalAlpha=S.vintage?0.55:0.7;
      cx.fillText(lines[i],sx+sW/2,sy+pd+(i+0.78)*lH);
      if(isD)cx.globalAlpha=S.vintage?0.82:1;
    }
    // Vintage noise overlay on stamp area
    if(S.vintage&&!S.noBg){
      var id=cx.getImageData(Math.max(0,Math.floor(sx)),Math.max(0,Math.floor(sy)),Math.min(Math.ceil(sW),cv.width-Math.floor(sx)),Math.min(Math.ceil(sH),cv.height-Math.floor(sy)));
      var d=id.data;
      for(var k=0;k<d.length;k+=4){var n=(Math.random()-0.5)*30;d[k]+=n;d[k+1]+=n;d[k+2]+=n}
      cx.putImageData(id,Math.max(0,Math.floor(sx)),Math.max(0,Math.floor(sy)));
    }
    cx.globalAlpha=1;

    cv.toBlob(function(blob){
      var fn=fname();
      function done(m,ok){if(ok)incCount();if(btn){btn.disabled=false;btn.textContent="💾 Sauvegarder l'image"}toast(m)}
      if(navigator.share&&navigator.canShare){
        var file=new File([blob],fn,{type:"image/png"});
        if(navigator.canShare({files:[file]})){navigator.share({files:[file],title:fn}).then(function(){done(fn+" partagé ✓",true)}).catch(function(e){if(e.name!=="AbortError")done("Partage annulé",false);else{if(btn){btn.disabled=false;btn.textContent="💾 Sauvegarder l'image"}}});return}
      }
      var url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=fn;a.click();URL.revokeObjectURL(url);done(fn+" sauvegardé ✓",true);
    },"image/png");
  };
  im.src=img;
};

window._autoStraighten=function(){
  // Analyze image edges to detect dominant angle
  var im=new Image();
  im.onload=function(){
    var cv2=document.getElementById("cv2"),cx=cv2.getContext("2d");
    var w=Math.min(im.width,400),h=Math.round(w*im.height/im.width);
    cv2.width=w;cv2.height=h;cx.drawImage(im,0,0,w,h);
    var id=cx.getImageData(0,0,w,h),d=id.data;
    // Simple edge detection: find dominant angle via Hough-like approach
    // Convert to grayscale + Sobel edge
    var gray=new Float32Array(w*h),edges=new Float32Array(w*h);
    for(var i=0;i<w*h;i++)gray[i]=(d[i*4]*0.299+d[i*4+1]*0.587+d[i*4+2]*0.114);
    for(var y=1;y<h-1;y++)for(var x=1;x<w-1;x++){
      var gx=gray[(y-1)*w+x+1]-gray[(y-1)*w+x-1]+2*(gray[y*w+x+1]-gray[y*w+x-1])+gray[(y+1)*w+x+1]-gray[(y+1)*w+x-1];
      var gy=gray[(y+1)*w+x-1]-gray[(y-1)*w+x-1]+2*(gray[(y+1)*w+x]-gray[(y-1)*w+x])+gray[(y+1)*w+x+1]-gray[(y-1)*w+x+1];
      edges[y*w+x]=Math.sqrt(gx*gx+gy*gy);
    }
    // Vote for angles -15 to 15 degrees
    var bins=new Float32Array(61);// -15 to +15 = 31 * 2 steps
    var threshold=80;
    for(var y2=1;y2<h-1;y2++)for(var x2=1;x2<w-1;x2++){
      if(edges[y2*w+x2]>threshold){
        var gx2=gray[(y2)*w+x2+1]-gray[(y2)*w+x2-1];
        var gy2=gray[(y2+1)*w+x2]-gray[(y2-1)*w+x2];
        var ang=Math.atan2(gy2,gx2)*180/Math.PI;
        // Normalize to -15..15 range (mod 90)
        ang=((ang%90)+90)%90;if(ang>45)ang-=90;
        if(ang>=-15&&ang<=15){var bin=Math.round(ang+15)*2;if(bin>=0&&bin<61)bins[bin]+=edges[y2*w+x2]}
      }
    }
    var bestBin=0,bestVal=0;
    for(var b=0;b<61;b++){if(bins[b]>bestVal){bestVal=bins[b];bestBin=b}}
    var detectedAngle=-(bestBin/2-15);
    if(Math.abs(detectedAngle)<0.5)detectedAngle=0;
    detectedAngle=Math.round(detectedAngle*2)/2;
    // Apply
    var slider=document.getElementById("straightSlider"),label=document.getElementById("straightAngle");
    if(slider){slider.value=detectedAngle}
    if(label){label.textContent=detectedAngle+"°"}
    applyImageRotation(detectedAngle);
    toast("Redressé de "+detectedAngle+"°");
  };
  im.src=imgFull;
};
window._manualStraighten=function(v){
  var angle=parseFloat(v);
  var label=document.getElementById("straightAngle");
  if(label)label.textContent=angle+"°";
  applyImageRotation(angle);
};
window._rotate90=function(){
  var im=new Image();
  im.onload=function(){
    var cv2=document.getElementById("cv2"),cx=cv2.getContext("2d");
    cv2.width=im.height;cv2.height=im.width;
    cx.translate(im.height,0);cx.rotate(Math.PI/2);
    cx.drawImage(im,0,0);
    imgFull=cv2.toDataURL("image/png");
    crop={x1:5,y1:5,x2:95,y2:95};
    scr="crop";render();
    toast("Rotation 90° ✓");
  };
  im.src=imgFull;
};
function applyImageRotation(angle){
  var im=new Image();
  im.onload=function(){
    var cv2=document.getElementById("cv2"),cx=cv2.getContext("2d");
    var rad=angle*Math.PI/180;
    var cos=Math.abs(Math.cos(rad)),sin=Math.abs(Math.sin(rad));
    var nw=Math.ceil(im.width*cos+im.height*sin),nh=Math.ceil(im.width*sin+im.height*cos);
    cv2.width=nw;cv2.height=nh;
    cx.translate(nw/2,nh/2);cx.rotate(rad);cx.drawImage(im,-im.width/2,-im.height/2);
    imgFull=cv2.toDataURL("image/png");
    var ci=document.getElementById("cropImg");if(ci)ci.src=imgFull;
  };
  im.src=imgFull;
}

// ── PWA SERVICE WORKER ──
if("serviceWorker" in navigator){
  var swCode="self.addEventListener('install',function(e){self.skipWaiting()});self.addEventListener('activate',function(e){e.waitUntil(clients.claim())});self.addEventListener('fetch',function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).then(function(resp){return caches.open('ndf-v1').then(function(cache){cache.put(e.request,resp.clone());return resp})})}))})";
  var swBlob=new Blob([swCode],{type:"application/javascript"});
  var swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

render();
})();
</script>
